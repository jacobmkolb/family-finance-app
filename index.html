<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-title" content="Family Finance">
<title>Family Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f7f5;--sur:#fff;--sur2:#f0f0ed;--sur3:#e8e8e4;--tx:#111110;--tx2:#6b6b67;--tx3:#a8a8a4;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.14);--gn:#1a9e6e;--gnb:#e8f7f1;--gnt:#0a6647;--rd:#e03e3e;--rdb:#fdeaea;--rdt:#8b1a1a;--am:#d97706;--amb:#fef3c7;--amt:#78350f;--bl:#2563eb;--blb:#eff6ff;--blt:#1e3a8a;--pu:#7c3aed;--pub:#f5f3ff;--put:#4c1d95;--r:10px;--rl:14px;--rxl:18px;--f:'DM Sans',sans-serif;--fm:'DM Mono',monospace}
.dark{--bg:#111110;--sur:#1c1c1a;--sur2:#242422;--sur3:#2c2c2a;--tx:#f0f0ec;--tx2:#a8a8a4;--tx3:#6b6b67;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--gn:#22c88a;--gnb:#0a2e1f;--gnt:#4ade80;--rd:#f87171;--rdb:#2d1010;--rdt:#fca5a5;--am:#fbbf24;--amb:#2d1f05;--amt:#fde68a;--bl:#60a5fa;--blb:#0f1f3d;--blt:#bfdbfe;--pu:#a78bfa;--pub:#1e1040;--put:#ddd6fe}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:80px;transition:background .3s,color .3s}
.app{max-width:960px;margin:0 auto;padding:1.25rem 1rem}
/* AUTH SCREENS */
.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-box{background:var(--sur);border-radius:var(--rxl);padding:2.5rem;width:100%;max-width:380px;text-align:center;border:.5px solid var(--bd)}
.auth-title{font-size:28px;font-weight:600;margin-bottom:0.5rem;color:var(--tx)}
.auth-subtitle{font-size:14px;color:var(--tx2);margin-bottom:2rem}
.auth-input{width:100%;padding:12px;margin-bottom:12px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--sur);color:var(--tx);font-family:var(--f);font-size:14px;outline:none}
.auth-input:focus{border-color:var(--gn)}
.auth-btn{width:100%;padding:12px;background:var(--gn);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f);margin-top:1rem}
.auth-btn:hover{opacity:0.9}
.auth-toggle{margin-top:1rem;font-size:14px;color:var(--tx2)}
.auth-toggle button{background:none;border:none;color:var(--gn);cursor:pointer;font-weight:500;text-decoration:underline}
.auth-error{color:var(--rd);font-size:13px;margin-bottom:1rem;display:none}
.user-select{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.user-card{flex:1;min-width:140px;padding:14px;border-radius:var(--rl);border:1.5px solid var(--bd2);background:var(--sur2);cursor:pointer;font-family:var(--f);transition:all .15s;text-align:center}
.user-card:hover{border-color:var(--gn);background:var(--gnb)}
.user-card.selected{border-color:var(--gn);background:var(--gnb)}
.user-emoji{font-size:32px;margin-bottom:8px}
.user-name{font-weight:500;color:var(--tx);margin-bottom:4px}
.user-role{font-size:12px;color:var(--tx2)}
.hidden{display:none!important}
/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.hdr-user{display:flex;align-items:center;gap:10px}
.logout-btn{padding:8px 16px;background:var(--rdb);color:var(--rdt);border:none;border-radius:var(--r);cursor:pointer;font-family:var(--f);font-size:13px;font-weight:500}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-container">
  <div class="auth-box">
    <div style="font-size:48px;margin-bottom:1rem">💰</div>
    <h1 class="auth-title">Family Finance</h1>
    <p class="auth-subtitle" id="authSubtitle">Sign in to your account</p>

    <div class="auth-error" id="authError"></div>

    <!-- User Selection (hidden by default) -->
    <div id="userSelectContainer" class="hidden">
      <p style="margin-bottom:1rem;font-size:14px">Who are you?</p>
      <div class="user-select">
        <div class="user-card" data-user="jacob">
          <div class="user-emoji">👨</div>
          <div class="user-name">Jacob</div>
          <div class="user-role">Full access</div>
        </div>
        <div class="user-card" data-user="arianne">
          <div class="user-emoji">👩</div>
          <div class="user-name">Arianne</div>
          <div class="user-role">Simple view</div>
        </div>
      </div>
      <button class="auth-btn" id="continueUserBtn">Continue</button>
    </div>

    <!-- Login/Signup Form -->
    <div id="authFormContainer">
      <input type="email" id="authEmail" class="auth-input" placeholder="Email address" autocomplete="email">
      <input type="password" id="authPassword" class="auth-input" placeholder="Password" autocomplete="current-password">
      <button class="auth-btn" id="authSubmitBtn">Sign In</button>

      <div class="auth-toggle">
        Don't have an account? <button id="toggleAuth">Create one</button>
      </div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="app hidden">
  <div class="hdr">
    <h1 style="font-size:24px;font-weight:600">Family Finance</h1>
    <div class="hdr-user">
      <span id="userDisplay"></span>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <p style="text-align:center;padding:2rem;color:var(--tx2)">
    ✅ You're signed in! The full app will load here.<br>
    🔗 Plaid integration and bank connections coming next...
  </p>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyCN6ad42UoMjrnQSCTmN34KRqfreh7vMiU",
  authDomain: "family-finance-app-af794.firebaseapp.com",
  projectId: "family-finance-app-af794",
  storageBucket: "family-finance-app-af794.firebasestorage.app",
  messagingSenderId: "824762124374",
  appId: "1:824762124374:web:8ac17d41aa92962ae013f7",
  measurementId: "G-NDCNL97ZV4"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// UI Elements
const authScreen = document.getElementById('authScreen');
const appScreen = document.getElementById('appScreen');
const authEmail = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const authError = document.getElementById('authError');
const toggleAuthBtn = document.getElementById('toggleAuth');
const userDisplay = document.getElementById('userDisplay');
const logoutBtn = document.getElementById('logoutBtn');
const authFormContainer = document.getElementById('authFormContainer');
const userSelectContainer = document.getElementById('userSelectContainer');
const continueUserBtn = document.getElementById('continueUserBtn');
const authSubtitle = document.getElementById('authSubtitle');

let isSignUp = false;
let selectedUser = 'jacob';

// User select handlers
document.querySelectorAll('.user-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedUser = card.dataset.user;
  });
});

continueUserBtn.addEventListener('click', () => {
  if (!selectedUser) {
    showError('Please select a user');
    return;
  }
  userSelectContainer.classList.add('hidden');
  authFormContainer.classList.remove('hidden');
  authSubtitle.textContent = selectedUser.charAt(0).toUpperCase() + selectedUser.slice(1) + ', sign in to continue';
});

// Toggle between login and signup
toggleAuthBtn.addEventListener('click', () => {
  isSignUp = !isSignUp;
  authSubmitBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
  toggleAuthBtn.textContent = isSignUp ? 'Sign in instead' : 'Create one';
  authSubtitle.textContent = isSignUp ? 'Create a new account' : 'Sign in to your account';
  authError.style.display = 'none';
});

// Auth form submission
authSubmitBtn.addEventListener('click', async () => {
  const email = authEmail.value.trim();
  const password = authPassword.value.trim();

  if (!email || !password) {
    showError('Please enter email and password');
    return;
  }

  try {
    authSubmitBtn.disabled = true;
    authSubmitBtn.textContent = 'Loading...';

    if (isSignUp) {
      await auth.createUserWithEmailAndPassword(email, password);
      // Save user info to Firestore
      await db.collection('users').doc(auth.currentUser.uid).set({
        email: email,
        role: selectedUser,
        createdAt: new Date()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }

    showApp();
  } catch (error) {
    showError(error.message);
  } finally {
    authSubmitBtn.disabled = false;
    authSubmitBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
  }
});

// Logout
logoutBtn.addEventListener('click', async () => {
  try {
    await auth.signOut();
    showAuth();
  } catch (error) {
    console.error('Logout error:', error);
  }
});

// Auth state listener
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const userDoc = await db.collection('users').doc(user.uid).get();
    const userData = userDoc.data();
    userDisplay.textContent = userData?.role ? userData.role.charAt(0).toUpperCase() + userData.role.slice(1) : 'User';
    showApp();
  } else {
    showAuth();
  }
});

// UI Helpers
function showError(message) {
  authError.textContent = message;
  authError.style.display = 'block';
}

function showAuth() {
  authScreen.classList.remove('hidden');
  appScreen.classList.add('hidden');
  authFormContainer.classList.remove('hidden');
  userSelectContainer.classList.add('hidden');
  authEmail.value = '';
  authPassword.value = '';
  authError.style.display = 'none';
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
  selectedUser = null;
}

function showApp() {
  authScreen.classList.add('hidden');
  appScreen.classList.remove('hidden');
}
</script>

</body>
</html>
